services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: hackathon_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: hackathon_db
      MYSQL_USER: hackathon_user
      MYSQL_PASSWORD: hackathon_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - observability-network

  # FastAPI Backend Application
  backend:
    build: .
    container_name: hackathon_backend
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: hackathon_user
      DB_PASSWORD: hackathon_pass
      DB_NAME: hackathon_db
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      LOG_LEVEL: INFO
    ports:
      - "8001:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./logs:/var/log/app
    networks:
      - observability-network
    restart: unless-stopped

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: hackathon_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - observability-network
    restart: unless-stopped

  # Loki - Log Aggregation
  loki:
    image: grafana/loki:latest
    container_name: hackathon_loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    networks:
      - observability-network
    restart: unless-stopped

  # Promtail - Log Shipper (collects logs from backend)
  promtail:
    image: grafana/promtail:latest
    container_name: hackathon_promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      - ./app:/var/log/app:ro
    depends_on:
      - loki
    networks:
      - observability-network
    restart: unless-stopped

  # Tempo - Distributed Tracing
  tempo:
    image: grafana/tempo:latest
    container_name: hackathon_tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP
      - "3200:3200"  # Tempo HTTP
    volumes:
      - ./tempo/tempo-config.yml:/etc/tempo/tempo.yml
      - tempo_data:/var/tempo
    networks:
      - observability-network
    restart: unless-stopped

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: hackathon_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - observability-network
    restart: unless-stopped

volumes:
  mysql_data:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:

networks:
  observability-network:
    driver: bridge

